<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Embedded Signup Callback</title>
    <style>
      body {
        font-family:
          Segoe UI,
          system-ui,
          -apple-system,
          sans-serif;
        margin: 24px;
        color: #111827;
      }
      pre {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f9fafb;
        padding: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1>Callback de Embedded Signup</h1>
    <p>Si todo va bien, aqui deberias ver <strong>code</strong> en la URL.</p>
    <pre id="out"></pre>

    <script>
      const out = document.getElementById('out');
      const params = new URLSearchParams(window.location.search);
      const payload = {
        href: window.location.href,
        code: params.get('code'),
        state: params.get('state'),
        error: params.get('error') || params.get('error_message'),
      };

      out.textContent = JSON.stringify(payload, null, 2);

      if (window.opener) {
        window.opener.postMessage(
          {
            source: 'embedded-signup-callback',
            payload,
          },
          '*',
        );
      }
    </script>
  </body>
</html>
