<div class="wrap">
  <section class="card">
    <h1>Embedded Signup - Capture de Code</h1>
    <p>
      Esta pantalla lanza el flujo de Meta y ayuda a capturar el
      <strong>code</strong> para enviarlo a
      <code>/onboarding/exchange</code>.
    </p>

    <div class="grid">
      <div>
        <label for="appId">META_APP_ID</label>
        <input id="appId" [(ngModel)]="appId" placeholder="Ej: 864793622627809" />
      </div>

      <div>
        <label for="configId">Embedded Signup Config ID</label>
        <input id="configId" [(ngModel)]="configId" placeholder="Config ID de Meta" />
      </div>

      <div>
        <label for="redirectUri">Redirect URI</label>
        <input id="redirectUri" [(ngModel)]="redirectUri" placeholder="https://<dominio>/callback.html" />
      </div>

      <div>
        <label for="clientId">client_id para backend</label>
        <input id="clientId" [(ngModel)]="clientId" />
      </div>

      <div>
        <label for="apiUrl">API URL</label>
        <input id="apiUrl" [(ngModel)]="apiUrl" />
      </div>

      <div>
        <label for="codeInput">Code capturado (manual)</label>
        <input id="codeInput" [(ngModel)]="codeInput" placeholder="Pega el code aqui" />
      </div>
    </div>

    <div class="actions">
      <button class="secondary" type="button" (click)="initSdk()">1) Inicializar SDK</button>
      <button class="primary" type="button" (click)="launchSignup()">2) Lanzar Embedded Signup</button>
      <button class="secondary" type="button" (click)="exchangeCode()">3) Enviar code a /onboarding/exchange</button>
    </div>

    <p class="tip">
      Consejo: los valores de configuracion se guardan en localStorage para no reescribirlos en cada prueba.
    </p>

    <div class="log">
      <div *ngFor="let item of logs" [class.ok]="item.type === 'ok'" [class.warn]="item.type === 'warn'">
        {{ item.text }}
      </div>
    </div>
  </section>
</div>
